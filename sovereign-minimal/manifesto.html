<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Manifesto — Powerhouse Novelas</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <!-- Direction Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .manifesto-layout {
            display: grid;
            grid-template-columns: 2fr 8fr 2fr;
            margin-top: 10rem;
        }
        .manifesto-layout aside {
            position: sticky;
            top: 5rem;
            height: max-content;
        }
        #toc a {
            display: block;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
            transition: color 0.3s;
        }
        #toc a.active { color: var(--gold); }
        main article {
            margin-bottom: 15rem;
        }
        main article .meta {
            display: block;
            margin-bottom: 2rem;
            font-family: var(--font-mono);
            color: var(--text-muted);
            font-size: 1.25rem;
        }
        main article h2 { 
            font-size: clamp(2rem, 4vw, 3.5rem); 
            margin-bottom: 4rem; 
            line-height: 1.2; 
            text-indent: -0.05em; 
        }
        main article p { 
            font-size: clamp(1rem, 2vw, 1.25rem); 
            margin-bottom: 2rem; 
            text-indent: 3rem; 
            max-width: 800px;
        }
        main article p:first-of-type { text-indent: 0; }
        
        @media (max-width: 900px) {
            .manifesto-layout { grid-template-columns: 1fr; }
            .manifesto-layout aside { position: static; margin-bottom: 4rem; }
            #toc { display: flex; flex-wrap: wrap; gap: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="library.html">Library</a></li>
            <li><a href="manifesto.html" class="active">Manifesto</a></li>
            <li><a href="world.html">The World</a></li>
        </ul>
    </nav>

    <div class="manifesto-layout">
        <aside>
            <nav id="toc"></nav>
        </aside>

        <main id="manifesto-content">
            <!-- Content loaded via JS -->
            <div id="loading" style="font-family: var(--font-mono); color: var(--gold);">Locating the texts...</div>
        </main>
    </div>

    <footer>
        <h2 style="font-family: var(--font-serif-heading); font-style: italic; color: #333;">Powerhouse Novelas</h2>
        <div class="universe">Part of the Monica Craiyon Universe</div>
    </footer>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const tocContainer = document.getElementById('toc');
        const contentContainer = document.getElementById('manifesto-content');
        const loading = document.getElementById('loading');

        fetch('../manifesto_data.json')
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';

                data.forEach((essay) => {
                    const link = document.createElement('a');
                    link.href = `#essay-${essay.num}`;
                    link.id = `toc-${essay.num}`;
                    link.innerText = `${String(essay.num).padStart(2, '0')}. ${essay.title}`;
                    tocContainer.appendChild(link);

                    const article = document.createElement('article');
                    article.id = `essay-${essay.num}`;
                    
                    let html = `<span class="meta">${String(essay.num).padStart(2, '0')}</span>`;
                    html += `<h2>${essay.title}</h2>`;
                    
                    const paragraphs = essay.content.split('\n').filter(p => p.trim() !== '');
                    paragraphs.forEach(p => {
                        html += `<p>${p}</p>`;
                    });
                    
                    article.innerHTML = html;
                    contentContainer.appendChild(article);
                });

                const articles = document.querySelectorAll('article');
                const observerOptions = {
                    root: null,
                    rootMargin: '-20% 0px -70% 0px',
                    threshold: 0
                };

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            document.querySelectorAll('#toc a').forEach(a => a.classList.remove('active'));
                            const id = entry.target.id.split('-')[1];
                            const activeLink = document.getElementById(`toc-${id}`);
                            if(activeLink) activeLink.classList.add('active');
                        }
                    });
                }, observerOptions);

                articles.forEach(article => observer.observe(article));
                
                if(data.length > 0 && !window.location.hash) {
                    document.getElementById(`toc-${data[0].num}`).classList.add('active');
                }
            })
            .catch(err => {
                loading.innerText = "Error loading manifesto.";
                console.error(err);
            });
    });
</script>
</body>
</html>
